				<h1 class="title fivetit">《君子慎处》</h1>
				<div class="contain scroll4">
					<p>—— 孔子</p>
					<p>孔子曰：“吾死之后，则商也日益，赐也日损。”曾子曰：“何谓也？”子曰：“商好与贤己者处，赐好说不若己者。
					不知其子，视其父；不知其人，视其友。不知其君，视其所使；不识其地，视其草木。故曰：“与善人居，如入芝兰之室，
					久而不闻其香，即与之化矣。与不善人居，如入鲍鱼之肆，久而不闻其臭，亦与之化矣。丹之所藏者赤，漆之所藏者黑，
					是以君子必慎其所与处者焉。”</p>
