			<h1 class="title fivetit">《等雪白头》</h1>
			<div class="contain scroll5">
				<p>—— 佚名</p>
				<h3>谈俗了的爱情</h3>
				<p>年轻的时候对于父辈的爱情是不屑一顾的，我甚至觉得这些老顽固老古董们怎么会有爱情，后来随着所见所闻的宽阔方才明白，
				吵架很多时候是对爱情的一种保护。这个世界天天离婚的人多了去了，但难道就因为这样你不相信爱情了么，只要你妈和你爸在一起，
				你姥姥和你姥爷在一起，你爷爷和你奶奶在一起，你姑姑和你姑父在一起，你姨夫和你姨妈在一起，你叔和你婶儿在一起，你就得相信爱情。</p>
